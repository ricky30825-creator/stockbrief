<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>주식 브리핑</title>
  <meta name="theme-color" content="#0f1115">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="주식 브리핑">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📊 주식 브리핑</h1>
    <div class="hdr-right">
      <span id="updated-at"></span>
      <button id="btn-refresh" title="새로고침">↻</button>
      <button id="btn-search" title="종목 검색">🔍</button>
    </div>
  </header>

  <div id="searchbar" class="hidden">
    <input id="search-input" type="search" placeholder="종목명·티커로 검색 (예: 삼성전자, NVDA)" autocomplete="off">
    <button id="search-clear">✕</button>
  </div>

  <div id="scroll-area">
    <main id="content">
      <p class="empty">불러오는 중…</p>
    </main>
    <footer class="disclaimer">유튜브 영상 자동 요약입니다. 투자 판단의 참고 자료일 뿐 투자 권유가 아닙니다.</footer>
  </div>

  <nav id="tabs">
    <button data-tab="feed" class="active">🏠<span>피드</span></button>
    <button data-tab="stocks">📈<span>종목별</span></button>
    <button data-tab="channels">📺<span>채널별</span></button>
    <button data-tab="usage">🧾<span>사용량</span></button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
